version: '3.9'

services:
  db:
  image: postgres:16-alpine
  container_name: merendachef_db
  restart: unless-stopped
  environment:
    POSTGRES_DB: merendachef
    POSTGRES_USER: merendachef_user
    POSTGRES_PASSWORD: ${DB_PASSWORD:-MerendaChef@2025!}
  volumes:
    - pgdata:/var/lib/postgresql/data
  ports:
    - "5433:5432"
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U merendachef_user -d merendachef"]
    interval: 20s
    timeout: 15s
    retries: 15
    start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: merendachef_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=merendachef;Username=merendachef_user;Password=${DB_PASSWORD:-MerendaChef@2025!}"
      Jwt__Secret: ${JWT_SECRET:-MerendaChefSuperSecretKey2025!XYZ}
      Jwt__Issuer: MerendaChef
      Jwt__Audience: MerendaChefUsers
      Email__SmtpHost: smtp.office365.com
      Email__SmtpPort: 587
      Email__User: disparador.dgi@faetec.rj.gov.br
      Email__Password: faetec@123
      Email__From: disparador.dgi@faetec.rj.gov.br
      ASPNETCORE_URLS: http://+:8080
      AllowedOrigins__0: http://10.200.2.161:3100
      AllowedOrigins__1: http://localhost:3100
    ports:
      - "8181:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://10.200.2.161:8181
    container_name: merendachef_web
    restart: unless-stopped
    ports:
      - "3100:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
